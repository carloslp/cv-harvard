<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="supabase-url" content="" />
    <meta name="supabase-anon-key" content="" />
    <title>Login</title>
  </head>
  <body>
    <main>
      <h1>Login</h1>
      <form id="login-form">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Ingresar</button>
      </form>
      <p id="error" role="alert"></p>
    </main>

    <script type="module">
      import { getSupabaseClient } from '../auth/supabase-client.js';

      const errorElement = document.getElementById('error');
      const form = document.getElementById('login-form');
      let supabase;

      try {
        supabase = getSupabaseClient();
        const {
          data: { session },
        } = await supabase.auth.getSession();

        if (session) {
          window.location.replace('/admin');
        }
      } catch (error) {
        errorElement.textContent = error instanceof Error ? error.message : 'Error de configuración';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorElement.textContent = '';

        const formData = new FormData(form);
        const email = String(formData.get('email') || '').trim();
        const password = String(formData.get('password') || '').trim();

        if (!supabase) {
          errorElement.textContent = 'Configura Supabase para iniciar sesión.';
          return;
        }

        if (!email || !password) {
          errorElement.textContent = 'Correo y contraseña son obligatorios.';
          return;
        }

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          errorElement.textContent = error.message;
          return;
        }

        window.location.replace('/admin');
      });
    </script>
  </body>
</html>
